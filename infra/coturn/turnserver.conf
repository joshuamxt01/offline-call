# coturn — TURN/STUN for Nexa WebRTC NAT traversal.
# Used ONLY as a fallback when online peers cannot connect P2P.
# NEVER used for LAN/offline calls (those use host candidates only).
#
# Authentication uses short-lived HMAC credentials issued by the backend
# (GET /api/v1/turn/credentials). The shared secret below MUST match
# TURN_SECRET in the backend env.

listening-port=3478
tls-listening-port=5349

# Advertise your server's public IP in production:
# external-ip=YOUR_PUBLIC_IP

realm=nexa.app
server-name=nexa.app

# Time-limited credential mechanism (RFC 5766 / "REST API")
use-auth-secret
static-auth-secret=CHANGE_ME_MATCH_BACKEND_TURN_SECRET

# Hardening
no-multicast-peers
no-cli
no-tlsv1
no-tlsv1_1
fingerprint
stale-nonce=600

# Relay range (open these UDP ports on the host/firewall in production)
min-port=49152
max-port=65535

# In production, provide TLS certs:
# cert=/etc/coturn/certs/fullchain.pem
# pkey=/etc/coturn/certs/privkey.pem
