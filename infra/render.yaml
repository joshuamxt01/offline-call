# Render blueprint for the Nexa backend (API + Socket.IO).
# Neon (Postgres) and Upstash (Redis) are external managed services — set their
# URLs as secret env vars in the Render dashboard (not committed here).
services:
  - type: web
    name: nexa-backend
    runtime: node
    plan: starter          # WebSocket support requires a paid instance type
    rootDir: .
    buildCommand: npm install
    startCommand: npm run start --workspace @nexa/backend
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: CORS_ORIGINS
        sync: false        # e.g. https://app.nexa.example
      - key: DATABASE_URL
        sync: false        # Neon pooled connection string (sslmode=require)
      - key: REDIS_URL
        sync: false        # Upstash rediss:// URL
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: TURN_SECRET
        sync: false        # must match coturn static-auth-secret
      - key: TURN_URLS
        sync: false        # turn:turn.nexa.example:3478
      - key: S3_ENDPOINT
        sync: false        # https://s3.us-west-004.backblazeb2.com
      - key: S3_REGION
        sync: false
      - key: S3_BUCKET
        sync: false
      - key: S3_ACCESS_KEY_ID
        sync: false
      - key: S3_SECRET_ACCESS_KEY
        sync: false
      - key: S3_FORCE_PATH_STYLE
        value: "true"
